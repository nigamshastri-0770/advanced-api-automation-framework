name: API Automation

on:

  push:

    branches:
      - main

  pull_request:

jobs:

  api-tests:

    runs-on:
      ubuntu-latest

    steps:

      - name: Checkout

        uses: actions/checkout@v4


      - name: Setup Python

        uses: actions/setup-python@v5

        with:

          python-version: "3.13"


      - name: Install Dependencies

        run: |

          python -m pip install --upgrade pip

          pip install -r requirements.txt


      - name: Execute Tests

        run: |

          pytest -v


      - name: Upload Reports

        uses: actions/upload-artifact@v4

        if: always()

        with:

          name: test-report

          path: reports/